<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyBound | Premium Flight UI</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <!-- Background blob -->
    <div class="blob"></div>

    <!-- Robust Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
        const h = React.createElement;

        // Inline Icons for 100% Reliability
        const HeartIcon = (props) => h('svg', { 
            xmlns: "http://www.w3.org/2000/svg", width: props.size || 18, height: props.size || 18, 
            viewBox: "0 0 24 24", fill: props.fill || "none", stroke: "currentColor", 
            strokeWidth: props.strokeWidth || 2, strokeLinecap: "round", strokeLinejoin: "round" 
        }, h('path', { d: "M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" }));

        const PlaneIcon = (props) => h('svg', { 
            xmlns: "http://www.w3.org/2000/svg", width: props.size || 16, height: props.size || 16, 
            viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", 
            strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" 
        }, h('path', { d: "M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 3 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z" }));

        const TagIcon = (props) => h('svg', { 
            xmlns: "http://www.w3.org/2000/svg", width: props.size || 16, height: props.size || 16, 
            viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", 
            strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" 
        }, h('path', { d: "M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z" }), h('line', { x1: "7", y1: "7", x2: "7.01", y2: "7" }));

        function FlightCardDetailItem({ icon, children }) {
            return h('div', { className: 'flight-card__detail-item' },
                h(icon, { size: 16 }),
                h('span', null, children)
            );
        }

        function FlightCardFav() {
            const [liked, setLiked] = React.useState(false);
            return h('button', {
                className: 'flight-card__favorite-btn--glass',
                type: 'button',
                onClick: (e) => { e.stopPropagation(); setLiked(!liked); }
            }, h(HeartIcon, { 
                size: 18, 
                strokeWidth: 2.5, 
                fill: liked ? "currentColor" : "none" 
            }));
        }

        function FlightCard({ city, flightClass, price, airportCode, imageUrl, isSplit = false }) {
            const priceFormatted = new Intl.NumberFormat("en-US", {
                style: "currency", currency: "USD", minimumFractionDigits: 0
            }).format(price);

            const cardClass = isSplit ? 'flight-card flight-card--split' : 'flight-card';

            return h('div', { className: cardClass },
                h('div', { className: 'flight-card__image-container' },
                    h('img', { className: 'flight-card__image', src: imageUrl, alt: city }),
                    h('div', { className: 'flight-card__overlay' }),
                    h(FlightCardFav)
                ),
                h('div', { className: 'flight-card__content' },
                    h('h2', { className: 'flight-card__title' }, city),
                    h('p', { className: 'flight-card__class' }, flightClass),
                    h('div', { className: 'flight-card__details' },
                        h(FlightCardDetailItem, { icon: TagIcon }, 'from ', h('strong', null, priceFormatted)),
                        h(FlightCardDetailItem, { icon: PlaneIcon }, h('strong', null, airportCode))
                    ),
                    h('div', { className: 'flight-card__actions' },
                        h('button', { className: 'flight-card__search-btn', type: 'button' }, 'Search flight')
                    )
                )
            );
        }

        function App() {
            return h('div', { className: 'app-container' },
                h('header', { style: { textAlign: 'center', marginBottom: '2em', marginTop: '1em' } },
                    h('h1', { style: { fontSize: '2.5rem', fontWeight: '800', letterSpacing: '-0.04em' } }, 'SkyBound'),
                    h('p', { style: { opacity: 0.6 } }, 'Premium flight deals curated for you.')
                ),
                h('main', null,
                    h(FlightCard, {
                        city: "New York", flightClass: "Economy", price: 120, airportCode: "JFK",
                        imageUrl: "https://assets.codepen.io/416221/new-york-city.jpeg"
                    }),
                    h(FlightCard, {
                        city: "Tokyo", flightClass: "Business", price: 850, airportCode: "HND",
                        imageUrl: "https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&q=80&w=600"
                    }),
                    h(FlightCard, {
                        city: "San Francisco", flightClass: "Premium economy", price: 240, airportCode: "SFO",
                        imageUrl: "https://assets.codepen.io/416221/golden-gate-bridge.jpeg", isSplit: true
                    })
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(h(App));
    </script>
</body>
</html>
