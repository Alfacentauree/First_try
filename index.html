<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Card UI | Premium Edition</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-type="module">
        import React, { StrictMode, useState } from "https://esm.sh/react";
        import { createRoot } from "https://esm.sh/react-dom/client";
        import clsx from "https://esm.sh/clsx";
        import * as Lucide from "https://esm.sh/lucide-react";

        const { Heart, Plane, Tag } = Lucide;

        function FlightCardDetailItem({ icon: Icon, children }) {
            return (
                <div className="flight-card__detail-item">
                    <Icon size={16} />
                    <span>{children}</span>
                </div>
            );
        }

        function FlightCardFav() {
            const [liked, setLiked] = useState(false);

            return (
                <button
                    className="flight-card__favorite-btn--glass"
                    type="button"
                    title="Add to favorites"
                    onClick={(e) => {
                        e.stopPropagation();
                        setLiked(!liked);
                    }}
                >
                    <Heart 
                        size={18} 
                        strokeWidth={2.5} 
                        fill={liked ? "currentColor" : "none"} 
                    />
                </button>
            );
        }

        function FlightCardSearch() {
            return (
                <button className="flight-card__search-btn" type="button">
                    Search flight
                </button>
            );
        }

        function FlightCard({
            city,
            flightClass,
            price,
            airportCode,
            imageUrl,
            isSplit = false
        }) {
            const priceFormatted = new Intl.NumberFormat("en-US", {
                style: "currency",
                currency: "USD",
                minimumFractionDigits: 0
            }).format(price);

            return (
                <div className={clsx(
                    "flight-card",
                    isSplit && "flight-card--split"
                )}>
                    <div className="flight-card__image-container">
                        <img
                            className="flight-card__image"
                            src={imageUrl}
                            alt={city}
                            loading="lazy"
                        />
                        <div className="flight-card__overlay"></div>
                        <FlightCardFav />
                    </div>
                    
                    <div className="flight-card__content">
                        <h2 className="flight-card__title">{city}</h2>
                        <p className="flight-card__class">{flightClass}</p>
                        <div className="flight-card__details">
                            <FlightCardDetailItem icon={Tag}>
                                from <strong>{priceFormatted}</strong>
                            </FlightCardDetailItem>
                            <FlightCardDetailItem icon={Plane}>
                                <strong>{airportCode}</strong>
                            </FlightCardDetailItem>
                        </div>
                        <div className="flight-card__actions">
                            <FlightCardSearch />
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            <title>SkyBound | Premium Flight UI</title>
            ...
                            <header style={{ textAlign: 'center', marginBottom: '2em', marginTop: '1em' }}>
                                <h1 style={{ fontSize: '2.5rem', fontWeight: '800', letterSpacing: '-0.04em' }}>SkyBound</h1>
                                <p style={{ opacity: 0.6 }}>Premium flight deals curated for you.</p>
                            </header>

                    <main>
                        <FlightCard
                            city="New York"
                            flightClass="Economy"
                            price={120}
                            airportCode="JFK"
                            imageUrl="https://assets.codepen.io/416221/new-york-city.jpeg"
                        />
                        <FlightCard
                            city="Tokyo"
                            flightClass="Business"
                            price={850}
                            airportCode="HND"
                            imageUrl="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&q=80&w=600"
                        />
                        <FlightCard
                            city="San Francisco"
                            flightClass="Premium economy"
                            price={240}
                            airportCode="SFO"
                            imageUrl="https://assets.codepen.io/416221/golden-gate-bridge.jpeg"
                            isSplit
                        />
                    </main>
                </div>
            );
        }

        const rootElement = document.getElementById("root");
        if (rootElement) {
            createRoot(rootElement).render(
                <StrictMode>
                    <App />
                </StrictMode>
            );
        }
    </script>
</body>
</html>
