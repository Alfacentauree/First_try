<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyBound | Premium Flight UI</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <!-- Background blob -->
    <div class="blob"></div>

    <script type="module">
        import React from "https://esm.sh/react@18";
        import { createRoot } from "https://esm.sh/react-dom@18/client";
        import clsx from "https://esm.sh/clsx";
        import { Heart, Plane, Tag } from "https://esm.sh/lucide-react";

        // Minimal h helper to replace JSX for instant browser compatibility
        const h = React.createElement;

        function FlightCardDetailItem({ icon, children }) {
            return h('div', { className: 'flight-card__detail-item' },
                h(icon, { size: 16 }),
                h('span', null, children)
            );
        }

        function FlightCardFav() {
            const [liked, setLiked] = React.useState(false);
            return h('button', {
                className: 'flight-card__favorite-btn--glass',
                type: 'button',
                onClick: (e) => { e.stopPropagation(); setLiked(!liked); }
            }, h(Heart, { 
                size: 18, 
                strokeWidth: 2.5, 
                fill: liked ? "currentColor" : "none" 
            }));
        }

        function FlightCardSearch() {
            return h('button', { className: 'flight-card__search-btn', type: 'button' }, 'Search flight');
        }

        function FlightCard({ city, flightClass, price, airportCode, imageUrl, isSplit = false }) {
            const priceFormatted = new Intl.NumberFormat("en-US", {
                style: "currency",
                currency: "USD",
                minimumFractionDigits: 0
            }).format(price);

            return h('div', { className: clsx('flight-card', isSplit && 'flight-card--split') },
                h('div', { className: 'flight-card__image-container' },
                    h('img', { className: 'flight-card__image', src: imageUrl, alt: city, loading: 'lazy' }),
                    h('div', { className: 'flight-card__overlay' }),
                    h(FlightCardFav)
                ),
                h('div', { className: 'flight-card__content' },
                    h('h2', { className: 'flight-card__title' }, city),
                    h('p', { className: 'flight-card__class' }, flightClass),
                    h('div', { className: 'flight-card__details' },
                        h(FlightCardDetailItem, { icon: Tag }, 'from ', h('strong', null, priceFormatted)),
                        h(FlightCardDetailItem, { icon: Plane }, h('strong', null, airportCode))
                    ),
                    h('div', { className: 'flight-card__actions' },
                        h(FlightCardSearch)
                    )
                )
            );
        }

        function App() {
            return h('div', { className: 'app-container' },
                h('header', { style: { textAlign: 'center', marginBottom: '2em', marginTop: '1em' } },
                    h('h1', { style: { fontSize: '2.5rem', fontWeight: '800', letterSpacing: '-0.04em' } }, 'SkyBound'),
                    h('p', { style: { opacity: 0.6 } }, 'Premium flight deals curated for you.')
                ),
                h('main', null,
                    h(FlightCard, {
                        city: "New York",
                        flightClass: "Economy",
                        price: 120,
                        airportCode: "JFK",
                        imageUrl: "https://assets.codepen.io/416221/new-york-city.jpeg"
                    }),
                    h(FlightCard, {
                        city: "Tokyo",
                        flightClass: "Business",
                        price: 850,
                        airportCode: "HND",
                        imageUrl: "https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&q=80&w=600"
                    }),
                    h(FlightCard, {
                        city: "San Francisco",
                        flightClass: "Premium economy",
                        price: 240,
                        airportCode: "SFO",
                        imageUrl: "https://assets.codepen.io/416221/golden-gate-bridge.jpeg",
                        isSplit: true
                    })
                )
            );
        }

        const root = createRoot(document.getElementById("root"));
        root.render(h(React.StrictMode, null, h(App)));
    </script>
</body>
</html>
